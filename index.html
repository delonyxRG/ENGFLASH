
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EngFlash AI — Infinite Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0c1117; --surface:#141b24; --surface2:#1c2735;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.15);
    --accent:#f9a84d; --accent2:#5eead4;
    --correct:#4ade80; --wrong:#f87171;
    --text:#e2e8f0; --text-muted:#64748b; --text-dim:#334155;
    --serif:'Playfair Display',Georgia,serif;
    --sans:'Source Sans 3',sans-serif;
    --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--sans);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 56px;
    background-image:
      radial-gradient(ellipse 60% 40% at 15% 10%,rgba(249,168,77,0.05) 0%,transparent 60%),
      radial-gradient(ellipse 50% 30% at 85% 85%,rgba(94,234,212,0.04) 0%,transparent 60%);
  }

  /* HEADER */
  .site-header{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:0 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .logo{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--text);}
  .logo span{color:var(--accent);font-style:normal;}
  .logo small{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:2px;display:block;margin-top:2px;}
  .hdr-btns{display:flex;gap:8px;}
  .hdr-btn{background:transparent;border:1px solid var(--border-strong);color:var(--text-muted);border-radius:6px;padding:5px 11px;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:1px;transition:all 0.2s;}
  .hdr-btn.on{color:var(--accent);border-color:var(--accent);}
  .hdr-btn.muted{color:var(--wrong);border-color:var(--wrong);}

  /* LEVEL + MODE TABS */
  .level-row{width:100%;max-width:520px;display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .level-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border-strong);background:transparent;font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer;color:var(--text-muted);transition:all 0.15s;}
  .level-chip.active{background:rgba(249,168,77,0.12);border-color:var(--accent);color:var(--accent);}
  .mode-tabs{width:100%;max-width:520px;display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{flex:1;padding:9px 0;background:var(--surface);border:1px solid var(--border-strong);color:var(--text-muted);border-radius:8px;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;}
  .tab-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(249,168,77,0.06);}

  /* PROGRESS */
  .progress-wrap{width:100%;max-width:520px;margin-bottom:20px;}
  .progress-meta{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-bottom:8px;}
  .progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}

  /* MAIN CARD */
  .main-card{
    width:100%;max-width:520px;align-self:stretch;
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:28px 28px 24px;margin-bottom:16px;min-height:200px;
    display:flex;flex-direction:column;justify-content:center;
    position:relative;overflow:hidden;
  }
  .main-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(249,168,77,0.35),transparent);}
  .card-number{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:14px;}
  .card-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .level-tag{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;padding:3px 8px;border:1px solid;}
  .lA1{color:#4ade80;border-color:rgba(74,222,128,0.3);}
  .lA2{color:#86efac;border-color:rgba(134,239,172,0.3);}
  .lB1{color:#f9a84d;border-color:rgba(249,168,77,0.3);}
  .lB2{color:#fb923c;border-color:rgba(251,146,60,0.3);}
  .lC1{color:#f87171;border-color:rgba(248,113,113,0.3);}
  .cat-tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-radius:4px;padding:3px 8px;border:1px solid var(--border-strong);}
  .big-word{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:6px;}
  .phonetic{font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.5px;}
  .pos-badge{display:inline-block;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--accent);margin-bottom:16px;}
  .word-def{font-size:15px;line-height:1.75;color:#94a3b8;text-align:left;border-top:1px solid var(--border);padding-top:14px;}
  .word-def strong{color:var(--text);}
  .word-example{font-size:13px;color:var(--text-muted);margin-top:10px;font-style:italic;line-height:1.6;text-align:left;padding-left:10px;border-left:2px solid var(--accent);}
  .word-trans{margin-top:10px;font-size:13px;font-family:var(--mono);color:var(--accent2);}
  .flip-hint{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-align:center;margin-top:16px;letter-spacing:1px;}
  .q-text{font-family:var(--serif);font-size:19px;line-height:1.55;color:var(--text);font-weight:500;}
  .q-hint{font-size:13px;color:var(--text-muted);margin-top:8px;font-style:italic;}
  .ai-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--accent2);border:1px solid rgba(94,234,212,0.25);border-radius:4px;padding:2px 7px;margin-bottom:10px;}
  .ai-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* LOADING */
  .loading-state{text-align:center;padding:20px 0;}
  .loading-spinner{width:32px;height:32px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-family:var(--mono);font-size:12px;color:var(--text-muted);letter-spacing:1px;}

  /* CONTROLS */
  .flip-controls{width:100%;max-width:520px;display:flex;gap:10px;margin-bottom:16px;}
  .flip-btn{flex:1;padding:13px;border-radius:10px;border:1px solid var(--border-strong);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .fb-show{background:var(--accent);color:#0c1117;border-color:var(--accent);}
  .fb-show:hover{filter:brightness(1.1);}
  .fb-know{background:transparent;color:var(--correct);border-color:rgba(74,222,128,0.4);}
  .fb-know:hover{background:rgba(74,222,128,0.08);}
  .fb-nope{background:transparent;color:var(--wrong);border-color:rgba(248,113,113,0.4);}
  .fb-nope:hover{background:rgba(248,113,113,0.08);}

  /* OPTIONS */
  .options-wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .opt-btn{background:var(--surface);border:1px solid var(--border-strong);color:var(--text);padding:14px 18px;border-radius:10px;font-family:var(--sans);font-size:14.5px;font-weight:400;line-height:1.45;text-align:left;cursor:pointer;transition:border-color 0.15s,background 0.15s,transform 0.1s;display:flex;align-items:flex-start;gap:12px;}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(249,168,77,0.04);}
  .opt-btn:active:not(:disabled){transform:scale(0.99);}
  .opt-label{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text-muted);flex-shrink:0;margin-top:1px;min-width:18px;}
  .opt-btn.correct{border-color:var(--correct);background:rgba(74,222,128,0.08);}
  .opt-btn.correct .opt-label{color:var(--correct);}
  .opt-btn.wrong{border-color:var(--wrong);background:rgba(248,113,113,0.08);}
  .opt-btn.wrong .opt-label{color:var(--wrong);}
  .opt-btn:disabled{cursor:default;}

  /* SPELL */
  .spell-wrap{width:100%;max-width:520px;margin-bottom:16px;}
  .spell-input{width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:16px;outline:none;transition:border-color 0.15s;}
  .spell-input:focus{border-color:var(--accent);}
  .spell-submit{width:100%;margin-top:10px;padding:13px;border-radius:10px;background:var(--accent);color:#0c1117;border:none;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;}

  /* FEEDBACK */
  .feedback-card{width:100%;max-width:520px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:16px;display:none;animation:slideUp 0.25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fb-status{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .fb-status.ok{color:var(--correct);}
  .fb-status.err{color:var(--wrong);}
  .fb-body{font-size:14px;line-height:1.75;color:#94a3b8;}
  .fb-body strong{color:var(--text);}
  .fb-body em{color:var(--accent);font-style:italic;}
  .fb-example{margin-top:10px;font-size:13px;color:var(--text-muted);font-style:italic;padding-left:10px;border-left:2px solid var(--accent);line-height:1.6;}
  .fb-translate{margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--accent2);}
  .retry-note{font-size:12px;color:var(--text-muted);margin-top:10px;display:flex;align-items:center;gap:5px;}
  .retry-dot{width:6px;height:6px;border-radius:50%;background:var(--wrong);flex-shrink:0;}
  .next-btn{margin-top:16px;width:100%;padding:12px;border-radius:8px;background:var(--accent);color:#0c1117;border:none;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;display:none;letter-spacing:0.3px;}
  .next-btn:hover{filter:brightness(1.1);}

  /* STATS */
  .stats-bar{width:100%;max-width:520px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center;}
  .stat-num{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text);display:block;}
  .stat-num.g{color:var(--correct);}
  .stat-num.r{color:var(--wrong);}
  .stat-lbl{font-family:var(--mono);font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-top:3px;}

  /* RESULT */
  #result-screen{display:none;width:100%;max-width:520px;animation:slideUp 0.3s ease;}
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;}
  .result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(249,168,77,0.4),transparent);}
  .res-grade{font-family:var(--mono);font-size:52px;font-weight:500;line-height:1;margin-bottom:6px;}
  .res-title{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:8px;}
  .res-sub{font-size:14px;color:var(--text-muted);line-height:1.6;max-width:360px;margin:0 auto 20px;}
  .res-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
  .pills-wrap{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px;}
  .pill{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text-muted);}
  .pill.ok{border-color:rgba(74,222,128,0.3);color:var(--correct);background:rgba(74,222,128,0.06);}
  .pill.err{border-color:rgba(248,113,113,0.3);color:var(--wrong);background:rgba(248,113,113,0.06);}
  .action-btn{width:100%;padding:14px;border-radius:10px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;margin-bottom:10px;}
  .a-primary{background:var(--accent);color:#0c1117;border:none;}
  .a-primary:hover{filter:brightness(1.1);}
  .a-secondary{background:transparent;color:var(--text-muted);border:1px solid var(--border-strong);}
  .a-secondary:hover{border-color:var(--accent);color:var(--accent);}

  .site-footer{margin-top:32px;font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;text-align:center;}

  /* SPEAK BUTTON */
  .speak-btn{
    display:inline-flex;align-items:center;gap:5px;
    background:transparent;border:1px solid rgba(94,234,212,0.35);
    color:var(--accent2);border-radius:6px;padding:5px 12px;
    font-family:var(--mono);font-size:10px;letter-spacing:1px;
    cursor:pointer;transition:all 0.2s;margin-top:10px;
  }
  .speak-btn:hover{background:rgba(94,234,212,0.08);border-color:var(--accent2);}
  .speak-btn.speaking{border-color:var(--accent2);background:rgba(94,234,212,0.12);animation:speakPulse 0.8s infinite;}
  @keyframes speakPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

  /* AI CONVO MODE */
  #convo-ui{
    display:none;width:100%;max-width:520px;
    flex-direction:column;gap:0;
  }
  .convo-header{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px 12px 0 0;padding:14px 18px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .convo-title{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);}
  .convo-topic-btn{
    font-family:var(--mono);font-size:9px;letter-spacing:1px;
    background:rgba(249,168,77,0.1);border:1px solid rgba(249,168,77,0.3);
    color:var(--accent);border-radius:4px;padding:4px 9px;cursor:pointer;
    transition:all 0.15s;
  }
  .convo-topic-btn:hover{background:rgba(249,168,77,0.2);}
  .convo-topic-bar{
    background:var(--surface2);border:1px solid var(--border);border-top:none;
    padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;
  }
  .topic-chip{
    font-family:var(--mono);font-size:9px;letter-spacing:0.5px;
    background:transparent;border:1px solid var(--border-strong);
    color:var(--text-muted);border-radius:4px;padding:3px 8px;cursor:pointer;
    transition:all 0.15s;
  }
  .topic-chip.active{background:rgba(94,234,212,0.1);border-color:var(--accent2);color:var(--accent2);}
  .convo-messages{
    background:var(--surface);border:1px solid var(--border);border-top:none;
    min-height:320px;max-height:420px;overflow-y:auto;
    padding:16px;display:flex;flex-direction:column;gap:12px;
    scroll-behavior:smooth;
  }
  .msg{display:flex;flex-direction:column;gap:4px;animation:slideUp 0.2s ease;}
  .msg.user{align-items:flex-end;}
  .msg.ai{align-items:flex-start;}
  .msg-bubble{
    max-width:85%;padding:11px 14px;border-radius:12px;
    font-size:14px;line-height:1.6;
  }
  .msg.user .msg-bubble{
    background:rgba(249,168,77,0.12);border:1px solid rgba(249,168,77,0.25);
    color:var(--text);border-radius:12px 12px 2px 12px;
  }
  .msg.ai .msg-bubble{
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:12px 12px 12px 2px;
  }
  .msg-meta{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:0.5px;padding:0 4px;}
  .correction-box{
    background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);
    border-radius:8px;padding:10px 12px;margin-top:4px;
    font-size:12px;line-height:1.65;color:#94a3b8;max-width:85%;
  }
  .correction-box .corr-label{font-family:var(--mono);font-size:9px;color:var(--wrong);letter-spacing:1px;margin-bottom:5px;display:block;}
  .correction-box .corr-label.ok{color:var(--correct);}
  .vocab-highlight{
    background:rgba(249,168,77,0.15);border-bottom:1px solid rgba(249,168,77,0.5);
    color:var(--accent);border-radius:2px;padding:0 2px;cursor:help;
  }
  .convo-typing{
    display:flex;align-items:center;gap:6px;padding:8px 4px;
    font-family:var(--mono);font-size:10px;color:var(--text-muted);
  }
  .typing-dots span{
    display:inline-block;width:5px;height:5px;border-radius:50%;
    background:var(--text-muted);margin:0 1px;
    animation:typingBounce 1s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:0.15s;}
  .typing-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes typingBounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-5px);}}
  .convo-input-row{
    background:var(--surface);border:1px solid var(--border);border-top:none;
    border-radius:0 0 12px 12px;padding:12px;
    display:flex;gap:8px;align-items:flex-end;
  }
  .convo-input{
    flex:1;padding:11px 14px;background:var(--surface2);
    border:1px solid var(--border-strong);border-radius:8px;
    color:var(--text);font-family:var(--sans);font-size:14px;
    outline:none;resize:none;min-height:44px;max-height:100px;
    line-height:1.5;transition:border-color 0.15s;
    font-family:var(--sans);
  }
  .convo-input:focus{border-color:var(--accent);}
  .convo-send-btn{
    padding:11px 16px;background:var(--accent);color:#0c1117;
    border:none;border-radius:8px;font-family:var(--mono);
    font-size:13px;font-weight:600;cursor:pointer;
    transition:filter 0.15s;flex-shrink:0;height:44px;
  }
  .convo-send-btn:hover{filter:brightness(1.1);}
  .convo-send-btn:disabled{opacity:0.5;cursor:default;}
  .convo-speak-btn{
    padding:0 11px;background:transparent;border:1px solid rgba(94,234,212,0.3);
    color:var(--accent2);border-radius:8px;cursor:pointer;height:44px;
    font-size:16px;transition:all 0.15s;flex-shrink:0;
  }
  .convo-speak-btn:hover{background:rgba(94,234,212,0.08);}
  .convo-speak-btn.recording{border-color:var(--wrong);color:var(--wrong);animation:speakPulse 0.6s infinite;}
  .convo-score-bar{
    display:flex;gap:8px;padding:8px 14px;
    background:var(--surface2);border:1px solid var(--border);border-top:none;
    flex-wrap:wrap;
  }
  .cscore{font-family:var(--mono);font-size:10px;color:var(--text-muted);}
  .cscore strong{color:var(--text);}

</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    Eng<span>Flash</span>
    <small>∞ LEARN-ENGLISH · INFINITE VOCAB</small>
  </div>
  <div class="hdr-btns">
    <button class="hdr-btn" id="music-btn" onclick="toggleMusic()">♪ MUSIC</button>
    <button class="hdr-btn" id="sfx-btn" onclick="toggleSfx()">🔊 SFX</button>
  </div>
</header>

<!-- LEVEL FILTER -->
<div class="level-row" id="level-row">
  <button class="level-chip active" data-level="ALL" onclick="setLevel(this)">SEMUA</button>
  <button class="level-chip" data-level="A1" onclick="setLevel(this)">A1 Pemula</button>
  <button class="level-chip" data-level="A2" onclick="setLevel(this)">A2 Dasar</button>
  <button class="level-chip" data-level="B1" onclick="setLevel(this)">B1 Menengah</button>
  <button class="level-chip" data-level="B2" onclick="setLevel(this)">B2 Atas</button>
  <button class="level-chip" data-level="C1" onclick="setLevel(this)">C1 Mahir</button>
</div>

<!-- MODE TABS -->
<div class="mode-tabs">
  <button class="tab-btn active" id="tab-flip" onclick="setMode('flip')">📖 KARTU</button>
  <button class="tab-btn" id="tab-quiz" onclick="setMode('quiz')">🎯 KUIS</button>

function getCtx(){
  if(!audioCtx){
    audioCtx = new(window.AudioContext||window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.value = 1.0; masterGain.connect(audioCtx.destination);
    musicGain = audioCtx.createGain(); musicGain.gain.value = 0.22; musicGain.connect(masterGain);
    sfxGain = audioCtx.createGain(); sfxGain.gain.value = 1.0; sfxGain.connect(masterGain);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playNote(freq, type, dur, vol, t, dest){
  const ctx=getCtx();
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(dest||sfxGain);
  o.start(t); o.stop(t+dur+0.02);
}

  mel.forEach(([f,d])=>playNote(f,'sine',0.35,0.8,t+d));
  // harmony
  const harm=[[659,0],[784,0.14],[988,0.28],[1319,0.42]];
  harm.forEach(([f,d])=>playNote(f,'sine',0.3,0.3,t+d));
}

// 🎵 MUSIK — lo-fi chord + melody lebih rich
function playChordBeat(){
  if(!musicOn) return;
  const ctx=getCtx(), t=ctx.currentTime;
  const chord=CHORDS[chordIdx%CHORDS.length];
  // Strum chord
  chord.forEach((f,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*0.03); g.gain.linearRampToValueAtTime(0.2,t+i*0.03+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
    o.connect(g); g.connect(musicGain); o.start(t+i*0.03); o.stop(t+1.0);
  });
  // Melody note
  const scaleFreqs=[261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25];
  const mf=scaleFreqs[Math.floor(Math.random()*scaleFreqs.length)]*(Math.random()<0.4?2:1);
  const mo=ctx.createOscillator(), mg=ctx.createGain();
  mo.type='sine'; mo.frequency.value=mf;
  const mdur=[0.25,0.3,0.4,0.5][Math.floor(Math.random()*4)];
  mg.gain.setValueAtTime(0,t+0.1); mg.gain.linearRampToValueAtTime(0.15,t+0.15);
  mg.gain.exponentialRampToValueAtTime(0.001,t+0.1+mdur);
  mo.connect(mg); mg.connect(musicGain); mo.start(t+0.1); mo.stop(t+0.1+mdur+0.05);
  chordIdx++;
}

let isGenerating = false;
let generationQueue = [];

async function generateMoreCards(level='B1', count=8){
  if(isGenerating) return;
  isGenerating = true;

  const existingWords = [...vocabPool.map(v=>v.word), ...usedWords].join(', ');
  const levelDesc = {A1:'sangat dasar (everyday words)',A2:'dasar (simple conversation)',B1:'menengah (common topics)',B2:'menengah atas (nuanced expression)',C1:'mahir (academic/professional)'}[level]||'menengah';

  const prompt = `Generate ${count} English vocabulary flashcards for Indonesian university students. Level: ${level} (${levelDesc}).
IMPORTANT: Do NOT repeat these words: ${existingWords.slice(0,500)}
Return ONLY a valid JSON array, no markdown, no explanation:
[
  {
    "word": "ExampleWord",
    "phonetic": "/ɪɡˈzɑːm.pəl/",
    "pos": "noun",
    "level": "${level}",
    "category": "Academic",
    "meaning": "Definisi singkat dalam bahasa Indonesia yang mudah dimengerti mahasiswa.",
    "translation": "terjemahan singkat",
    "example": "A short example sentence in English.",
    "options": ["terjemahan benar", "distraktor 1", "distraktor 2", "distraktor 3"]
  }
]
Categories to use (pick varied): Academic, Daily Life, Emotions, Personality, Campus, Advanced, Science, Business, Idiom, Phrasal Verb
Make sure options[0] is always the correct translation. Other 3 options are plausible but wrong.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c=>c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const cards = JSON.parse(clean);
    if(Array.isArray(cards) && cards.length > 0){
      const newCards = cards.filter(c=>c.word && !vocabPool.find(v=>v.word.toLowerCase()===c.word.toLowerCase()));
      vocabPool.push(...newCards);
      generationQueue.push(...newCards);
      return newCards;
    }
  } catch(e){
    console.warn('AI generation failed, using seed pool:', e);
  } finally {
    isGenerating = false;
  }
  return [];
}

let currentUtterance = null;

// ── VOICE ENGINE ──────────────────────
let voicesReady = false;
let voiceList = [];

function getBestVoice(){
  const v = voiceList;
  // Priority: Google US > any en-US > any en-GB > any English
  return v.find(x=>x.lang==='en-US'&&x.name.toLowerCase().includes('google'))
    || v.find(x=>x.lang==='en-US'&&!x.name.toLowerCase().includes('zira'))
    || v.find(x=>x.lang==='en-GB')
    || v.find(x=>x.lang.startsWith('en'))
    || null;
}

function initVoices(){
  if(!('speechSynthesis' in window)) return;
  const load = ()=>{ voiceList = window.speechSynthesis.getVoices(); voicesReady=voiceList.length>0; };
  load();
  window.speechSynthesis.onvoiceschanged = load;
}
initVoices();

function speakWord(word, isHint=false, btnEl=null){
  if(!('speechSynthesis' in window)){ alert('Browser kamu tidak support TTS. Gunakan Chrome!'); return; }
  window.speechSynthesis.cancel();
  const btn = btnEl || document.getElementById('speak-main');
  // Speak word slowly and clearly
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.72;   // slow & clear
  utter.pitch = 1.05;
  utter.volume = 1.0;
  const voice = getBestVoice();
  if(voice) utter.voice = voice;

  if(btn){
    const origText = btn.textContent;
    btn.classList.add('speaking'); btn.textContent='🔊 ...';
    utter.onend  = ()=>{ btn.classList.remove('speaking'); btn.textContent=origText; };
    utter.onerror= ()=>{ btn.classList.remove('speaking'); btn.textContent=origText; };
  }
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function speakText(text, onEnd=null){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang='en-US'; utter.rate=0.82; utter.pitch=1.0; utter.volume=1.0;
  const voice = getBestVoice();
  if(voice) utter.voice = voice;
  if(onEnd) utter.onend = onEnd;
  utter.onerror = ()=>{ if(onEnd) onEnd(); };
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

    chip.addEventListener('click', ()=>{
      document.querySelectorAll('.topic-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      convoTopic = chip.dataset.topic;
      newConvoTopic();
    });
  });

  // Opening message from AI
  addMessage('ai', null, {
    reply: `Hi! I'm your English conversation partner 🎙️ Let's talk about ${TOPICS[convoTopic].label}!`,
    corrections: [],
    vocab_spotlight: null,
    keep_going: "To start — what did you do today? Tell me something interesting!"
  });
}

function newConvoTopic(){
  const t = TOPICS[convoTopic];
  convoHistory = [];
  clearMessages();
  addMessage('ai', null, {
    reply: `Great! Let's switch to ${t.label}. 🎯`,
    corrections: [],
    vocab_spotlight: null,
    keep_going: getTopicStarter(convoTopic)
  });
}

function getTopicStarter(topic){
  const starters = {
    daily: "What's your typical morning routine like?",
    campus: "What subject are you studying this semester, and do you enjoy it?",
    travel: "If you could travel anywhere right now, where would you go and why?",
    career: "What kind of career are you hoping to have after graduation?",
    debate: "Do you think social media has made people's lives better or worse?",
    science: "What's the most interesting thing you've learned in biology recently?",
  };
  return starters[topic] || "Tell me something about yourself!";
}

function clearMessages(){
  document.getElementById('convo-messages').innerHTML='';
}

function addMessage(role, userText, aiData){
  const box = document.getElementById('convo-messages');

  if(role==='user'){
    const div = document.createElement('div');
    div.className='msg user';
    div.innerHTML=`<div class="msg-bubble">${escHtml(userText)}</div><div class="msg-meta">Kamu · just now</div>`;
    box.appendChild(div);
  } else if(role==='ai' && aiData){
    // Main reply
    const div = document.createElement('div');
    div.className='msg ai';
    const replyHtml = highlightVocab(escHtml(aiData.reply));
    const keepHtml  = highlightVocab(escHtml(aiData.keep_going));
    div.innerHTML=`
      <div class="msg-bubble">
        ${replyHtml}
        ${aiData.keep_going ? `<div style="margin-top:8px;color:var(--accent);font-style:italic;">${keepHtml}</div>` : ''}
        ${aiData.translation_id ? `<div style="margin-top:8px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);padding-top:7px;">🇮🇩 <em>${escHtml(aiData.translation_id)}</em></div>` : ''}
        <button style="margin-top:6px;background:none;border:none;color:var(--accent2);font-size:11px;font-family:var(--mono);cursor:pointer;padding:0;letter-spacing:0.5px;" onclick="speakText(${JSON.stringify(aiData.reply + (aiData.keep_going?' '+aiData.keep_going:''))})">🔊 Dengar</button>
      </div>
      <div class="msg-meta">AI Partner · ${TOPICS[convoTopic].label}</div>`;
    box.appendChild(div);

    // Corrections
    if(aiData.corrections && aiData.corrections.length > 0){
      convoStats.fixes += aiData.corrections.length;
      const cDiv = document.createElement('div');
      cDiv.className='msg ai';
      let cHtml = aiData.corrections.map(c=>
        `<div style="margin-bottom:6px;">❌ <span style="color:var(--wrong);text-decoration:line-through;">"${escHtml(c.original)}"</span><br>✅ <span style="color:var(--correct);">"${escHtml(c.fixed)}"</span><br><span style="font-size:11px;color:var(--text-muted);">💡 ${escHtml(c.tip)}</span></div>`
      ).join('');
      cDiv.innerHTML=`<div class="correction-box"><span class="corr-label">🔍 KOREKSI GRAMMAR / VOCAB</span>${cHtml}</div>`;
      box.appendChild(cDiv);
    }

    // Vocab spotlight
    if(aiData.vocab_spotlight && aiData.vocab_spotlight.word){
      convoStats.vocab++;
      const vDiv = document.createElement('div');
      vDiv.className='msg ai';
      vDiv.innerHTML=`<div class="correction-box" style="border-color:rgba(94,234,212,0.3);background:rgba(94,234,212,0.04);">
        <span class="corr-label ok">✨ VOCAB BARU</span>
        <strong style="color:var(--accent2);font-size:15px;">${escHtml(aiData.vocab_spotlight.word)}</strong>
        <span style="color:var(--text-muted);font-size:12px;margin-left:6px;">${escHtml(aiData.vocab_spotlight.phonetic||'')}</span>
        <button onclick="speakText('${aiData.vocab_spotlight.word.replace(/'/g,"\\'")}');" style="background:none;border:none;color:var(--accent2);cursor:pointer;font-size:12px;margin-left:4px;">🔊</button>
        <div style="margin-top:4px;font-size:12px;color:#94a3b8;">🇮🇩 ${escHtml(aiData.vocab_spotlight.meaning)}</div>
      </div>`;
      box.appendChild(vDiv);
    }
  }

  updateConvoStats();
  box.scrollTop = box.scrollHeight;
}

function highlightVocab(text){
  // Bold words that look like interesting vocab (6+ chars, alphabetic)
  return text.replace(/\b([A-Z][a-z]{5,}|[a-z]{7,})\b/g, (m)=>{
    // Don't highlight very common words
    const common = new Set(['because','through','students','university','something','everything','remember','together','yourself','another','between','different','important','interesting']);
    return common.has(m.toLowerCase()) ? m : `<span class="vocab-highlight" title="vocab">${m}</span>`;
  });
}

function escHtml(s){ return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function updateConvoStats(){
  document.getElementById('cs-msgs').textContent  = convoStats.msgs;
  document.getElementById('cs-fixes').textContent = convoStats.fixes;
  document.getElementById('cs-vocab').textContent = convoStats.vocab;
  document.getElementById('cs-level-badge').textContent = currentLevel==='ALL'?'B1':currentLevel;
}

function showTyping(){
  const box = document.getElementById('convo-messages');
  const div = document.createElement('div');
  div.id='typing-indicator';
  div.className='msg ai';
  div.innerHTML=`<div class="msg-bubble convo-typing"><span class="typing-dots"><span></span><span></span><span></span></span>&nbsp;AI is thinking...</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hideTyping(){
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

async function sendConvoMsg(textOverride=null){
  if(isConvoLoading) return;
  const input = document.getElementById('convo-input');
  const text = textOverride || input.value.trim();
  if(!text) return;

  if(!textOverride){ input.value=''; input.style.height='auto'; }
  addMessage('user', text, null);
  convoStats.msgs++;
  isConvoLoading = true;
  document.getElementById('convo-send').disabled=true;
  showTyping();

  // Build conversation history for context (last 10 turns)
  const histSlice = convoHistory.slice(-10);
  const msgs = [...histSlice, {role:'user', content: text}];
  convoHistory.push({role:'user', content: text});

  const systemPrompt = getConvoSystemPrompt();

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:800,
        system: systemPrompt,
        messages: msgs
      })
    });

    if(!response.ok){
      const errText = await response.text();
      throw new Error(`API ${response.status}: ${errText}`);
    }

    const data = await response.json();
    const rawText = (data.content||[]).map(c=>c.text||'').join('').trim();
    // Strip any accidental markdown fences
    const clean = rawText.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();

    let aiData;
    try {
      aiData = JSON.parse(clean);
    } catch(e){
      // If JSON fails, wrap plain text as reply
      aiData = {
        reply: rawText || "That's interesting! Tell me more.",
        translation_id: "",
        corrections: [],
        vocab_spotlight: null,
        keep_going: "Can you say more about that?"
      };
    }

    convoHistory.push({role:'assistant', content: rawText});
    hideTyping();
    addMessage('ai', null, aiData);

    // CALL MODE: auto-speak AI reply then re-open mic
    if(callMode && aiData.reply){
      const fullSpeak = aiData.reply + (aiData.keep_going ? ' ' + aiData.keep_going : '');
      speakText(fullSpeak, ()=>{
        if(callMode) setTimeout(startCallMic, 600);
      });
    }

  } catch(e){
    console.error('Convo API error:', e);
    hideTyping();
    addMessage('ai', null, {
      reply: "Hmm, something went wrong on my end. Let's keep going!",
      translation_id: "Hmm, ada masalah di sisi saya. Ayo lanjutkan!",
      corrections:[], vocab_spotlight:null,
      keep_going:"What were you saying?"
    });
  } finally {
    isConvoLoading=false;
    document.getElementById('convo-send').disabled=false;
    if(!callMode) document.getElementById('convo-input').focus();
  }
}

// ── VOICE INPUT & CALL MODE ──────────
let callMode = false;
let callRecognition = null;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('Voice input tidak tersedia. Gunakan Chrome!');
    return;
  }
  const btn = document.getElementById('mic-btn');
  if(recognition){
    recognition.stop(); recognition=null;
    btn.classList.remove('recording'); btn.textContent='🎤';
    return;
  }
  startOneShotMic();
}

function startOneShotMic(){
  const btn = document.getElementById('mic-btn');
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onstart  = ()=>{ btn.classList.add('recording'); btn.textContent='⏹️'; };
  recognition.onresult = (e)=>{
    const transcript = e.results[0][0].transcript;
    document.getElementById('convo-input').value = transcript;
    autoResizeTA(document.getElementById('convo-input'));
  };
  recognition.onend  = ()=>{ recognition=null; btn.classList.remove('recording'); btn.textContent='🎤'; };
  recognition.onerror= ()=>{ recognition=null; btn.classList.remove('recording'); btn.textContent='🎤'; };
  recognition.start();
}

// ── CALL MODE (mic → AI speaks → mic → ...) ──
function toggleCallMode(){
  callMode = !callMode;
  const btn = document.getElementById('call-btn');
  const statusBar = document.getElementById('call-status-bar');
  if(callMode){
    btn.textContent='📵 Tutup';
    btn.style.background='var(--wrong)';
    btn.style.color='#fff';
    btn.style.borderColor='var(--wrong)';
    statusBar.style.display='block';
    // Greet then open mic
    const greet = `Hi! I'm ready. Go ahead and speak in English, I'm listening!`;
    addMessage('ai', null, {
      reply: greet,
      translation_id: 'Halo! Saya siap. Bicara dalam bahasa Inggris, saya mendengarkan!',
      corrections:[], vocab_spotlight:null, keep_going:''
    });
    speakText(greet, ()=>{ if(callMode) startCallMic(); });
  } else {
    btn.textContent='📞 Telepon';
    btn.style.background='';
    btn.style.color='';
    btn.style.borderColor='';
    statusBar.style.display='none';
    stopCallMic();
    window.speechSynthesis.cancel();
  }
}

function startCallMic(){
  if(!callMode) return;
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) return;
  if(callRecognition) return; // already running

  const callBar = document.getElementById('call-status');
  if(callBar){ callBar.textContent='🎤 Mendengarkan...'; callBar.style.color='var(--correct)'; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  callRecognition = new SR();
  callRecognition.lang='en-US'; callRecognition.continuous=false; callRecognition.interimResults=false;
  callRecognition.maxAlternatives=1;

  callRecognition.onresult=(e)=>{
    const transcript = e.results[0][0].transcript.trim();
    if(callBar){ callBar.textContent='💬 Memproses...'; callBar.style.color='var(--accent)'; }
    if(transcript) sendConvoMsg(transcript);
  };
  callRecognition.onend=()=>{
    callRecognition=null;
    if(callBar && callMode){ callBar.textContent='⏳ AI menjawab...'; callBar.style.color='var(--text-muted)'; }
  };
  callRecognition.onerror=(e)=>{
    callRecognition=null;
    if(callMode && e.error!=='aborted') setTimeout(startCallMic, 1000);
    if(callBar){ callBar.textContent='⚠️ Coba lagi...'; callBar.style.color='var(--wrong)'; }
  };
  callRecognition.start();
}

function stopCallMic(){
  if(callRecognition){ callRecognition.stop(); callRecognition=null; }
  const callBar = document.getElementById('call-status');
  if(callBar){ callBar.textContent=''; }
}

function autoResizeTA(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

startNewSession();
</script>
